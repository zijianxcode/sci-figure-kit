<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>fig_research_framework</title>
<style>
  html, body {
    margin: 0;
    width: 1600px;
    height: 900px;
    overflow: hidden;
    background: white;
  }
  svg {
    display: block;

<body>
<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#52616f"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#3c7a58"/>
    </marker>
    <style>
      text { font-family: "Source Sans 3", "Inter", "Helvetica Neue", Arial, sans-serif; }
      .small { fill: #6b7280; font-size: 18px; }
      .label { fill: #1f2933; font-size: 23px; font-weight: 650; }
      .micro { fill: #6b7280; font-size: 16px; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
<rect x="70" y="52" width="1460" height="100" rx="22" fill="#eaf3fb" stroke="#9bbbd5" stroke-width="2"/>
<text x="800" y="88" fill="#3b6f9f" font-size="24" font-weight="750" text-anchor="middle">Cognitive Control Rights Distribution Coding Scheme</text>
<text x="800" y="122" fill="#6b7280" font-size="19" font-weight="400" text-anchor="middle">Four decision nodes × H/A/J states, with T as the dynamic transition indicator</text>
<line x1="800" y1="152" x2="800" y2="198" stroke="#3c7a58" stroke-width="3" fill="none" marker-end="url(#arrow-green)"/>
<rect x="120" y="215" width="390" height="118" rx="18" fill="#eaf3fb" stroke="#3b6f9f" stroke-width="2.3"/>
<text x="315" y="258" fill="#3b6f9f" font-size="23" font-weight="750" text-anchor="middle">RQ1 Pattern Identification</text>
<text x="315" y="290" fill="#1f2933" font-size="17" font-weight="400" text-anchor="middle"><tspan x="315" dy="0">What typical types emerge across</tspan><tspan x="315" dy="22">the four cognitive decision nodes?</tspan></text>
<rect x="605" y="215" width="390" height="118" rx="18" fill="#fbf4df" stroke="#9a7330" stroke-width="2.3"/>
<text x="800" y="258" fill="#9a7330" font-size="23" font-weight="750" text-anchor="middle">RQ2 Outcome Differences</text>
<text x="800" y="290" fill="#1f2933" font-size="17" font-weight="400" text-anchor="middle"><tspan x="800" dy="0">Do collaboration types differ in design</tspan><tspan x="800" dy="22">quality and design thinking gains?</tspan></text>
<rect x="1090" y="215" width="390" height="118" rx="18" fill="#edf7f0" stroke="#3c7a58" stroke-width="2.3"/>
<text x="1285" y="258" fill="#3c7a58" font-size="23" font-weight="750" text-anchor="middle">RQ3 Individual Correlates</text>
<text x="1285" y="290" fill="#1f2933" font-size="17" font-weight="400" text-anchor="middle"><tspan x="1285" dy="0">Which learner characteristics co-occur</tspan><tspan x="1285" dy="22">with each collaboration type?</tspan></text>
<line x1="510" y1="274" x2="590" y2="274" stroke="#3c7a58" stroke-width="3" fill="none" marker-end="url(#arrow-green)"/>
<line x1="995" y1="274" x2="1075" y2="274" stroke="#3c7a58" stroke-width="3" fill="none" marker-end="url(#arrow-green)"/>
<text x="800" y="370" fill="#b85c6a" font-size="20" font-weight="650" text-anchor="middle">H1 establishes the typology; H2-H6 depend on RQ1 classification</text>
<path d="M315 333 C315 390 800 390 800 430" stroke="#b85c6a" stroke-width="2.5" fill="none" stroke-dasharray="8 7" marker-end="url(#arrow)"/>
<path d="M800 333 C800 390 800 390 800 430" stroke="#b85c6a" stroke-width="2.5" fill="none" stroke-dasharray="8 7" marker-end="url(#arrow)"/>
<path d="M1285 333 C1285 390 800 390 800 430" stroke="#b85c6a" stroke-width="2.5" fill="none" stroke-dasharray="8 7" marker-end="url(#arrow)"/>
<rect x="120" y="450" width="390" height="220" rx="18" fill="#eaf3fb" stroke="#3b6f9f" stroke-width="2"/>
<text x="150" y="492" fill="#3b6f9f" font-size="23" font-weight="800" text-anchor="start">H1</text>
<text x="315" y="524" fill="#1f2933" font-size="21" font-weight="750" text-anchor="middle">Type Existence</text>
<text x="315" y="573" fill="#1f2933" font-size="16" font-weight="400" text-anchor="middle"><tspan x="315" dy="0">At least three distinguishable types:</tspan><tspan x="315" dy="21">H-dominant / A-dominant / J-dominant</tspan></text>
<rect x="565" y="450" width="470" height="220" rx="18" fill="#fbf4df" stroke="#9a7330" stroke-width="2"/>
<text x="595" y="492" fill="#9a7330" font-size="23" font-weight="800" text-anchor="start">H2-H4</text>
<text x="800" y="524" fill="#1f2933" font-size="21" font-weight="750" text-anchor="middle">Type Effects</text>
<text x="800" y="573" fill="#1f2933" font-size="16" font-weight="400" text-anchor="middle"><tspan x="800" dy="0">H2 Ideation: J &gt; A on novelty</tspan><tspan x="800" dy="21">H3 Convergence: H &gt; A on feasibility</tspan><tspan x="800" dy="21">H4 A-type is faster, but weaker in post-test</tspan></text>
<rect x="1090" y="450" width="390" height="220" rx="18" fill="#edf7f0" stroke="#3c7a58" stroke-width="2"/>
<text x="1120" y="492" fill="#3c7a58" font-size="23" font-weight="800" text-anchor="start">H5-H6</text>
<text x="1285" y="524" fill="#1f2933" font-size="21" font-weight="750" text-anchor="middle">Learner Conditions</text>
<text x="1285" y="573" fill="#1f2933" font-size="16" font-weight="400" text-anchor="middle"><tspan x="1285" dy="0">H5 Self-efficacy / AI experience / SRL</tspan><tspan x="1285" dy="21">H6 Exploratory style predicts higher T</tspan></text>
<rect x="250" y="730" width="1100" height="86" rx="18" fill="#f4f6f8" stroke="#d7dde5" stroke-width="2"/>
<text x="800" y="763" fill="#6b7280" font-size="22" font-weight="700" text-anchor="middle">Empirical Chain</text>
<text x="800" y="797" fill="#1f2933" font-size="24" font-weight="700" text-anchor="middle">Identify types → Compare outcomes → Explain learner conditions</text>
</svg>
