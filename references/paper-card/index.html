<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paper Card · 论文精读</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf8f5;
    --text: #2c2c2c;
    --text-secondary: #5a5a5a;
    --accent: #2c3e5a;
    --accent-light: #e8ecf1;
    --card-bg: #ffffff;
    --card-shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --card-hover-shadow: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
    --border: #e8e4df;
    --radius: 12px;
    --font-serif: "Noto Serif SC", "Source Han Serif SC", "STSong", "Songti SC", Georgia, serif;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    --max-width: 1200px;
    --card-min-width: 320px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    line-height: 1.6;
    min-height: 100vh;
  }

  .container {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 40px 20px 60px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 40px 0 48px;
  }

  .header h1 {
    font-family: var(--font-serif);
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.02em;
    margin-bottom: 8px;
  }

  .header p {
    font-size: 15px;
    color: var(--text-secondary);
    max-width: 420px;
    margin: 0 auto;
    line-height: 1.7;
  }

  /* Card Grid */
  .card-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
  }

  @media (min-width: 768px) {
    .card-grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (min-width: 1024px) {
    .card-grid { grid-template-columns: repeat(3, 1fr); }
  }

  /* Card */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: box-shadow 0.2s ease, transform 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .card:hover {
    box-shadow: var(--card-hover-shadow);
    transform: translateY(-1px);
  }

  .card:active {
    transform: translateY(0);
  }

  .card-thumb {
    width: 100%;
    aspect-ratio: 390 / 220;
    object-fit: cover;
    display: block;
    background: var(--accent-light);
  }

  .card-thumb-placeholder {
    width: 100%;
    aspect-ratio: 390 / 220;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #e8ecf1 0%, #dce3ea 100%);
    color: var(--accent);
    font-family: var(--font-serif);
    font-size: 18px;
    font-weight: 600;
    text-align: center;
    padding: 24px;
    line-height: 1.4;
  }

  .card-body {
    padding: 16px 18px 20px;
  }

  .card-venue {
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }

  .card-title {
    font-family: var(--font-serif);
    font-size: 17px;
    font-weight: 700;
    line-height: 1.45;
    color: var(--text);
    margin-bottom: 8px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-authors {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 6px;
    line-height: 1.5;
  }

  .card-description {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-year {
    font-size: 12px;
    color: var(--text-secondary);
    opacity: 0.7;
    margin-top: 8px;
  }

  .card-draft-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    color: #b0842c;
    background: #fef3d6;
    padding: 2px 8px;
    border-radius: 4px;
    margin-top: 8px;
  }

  /* Empty State */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-secondary);
  }

  .empty-state .icon {
    font-size: 48px;
    margin-bottom: 16px;
    color: var(--border);
  }

  .empty-state h2 {
    font-family: var(--font-serif);
    font-size: 20px;
    color: var(--text);
    margin-bottom: 8px;
  }

  .empty-state p {
    font-size: 15px;
    max-width: 360px;
    margin: 0 auto;
    line-height: 1.7;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 40px 0 20px;
    font-size: 13px;
    color: var(--text-secondary);
    opacity: 0.6;
  }
</style>
</head>
<body>
<div class="container">
  <header class="header">
    <h1>Paper Card</h1>
    <p>学术论文精读，提炼为手机友好的视觉长图。每篇论文都是一次深度对话。</p>
  </header>

  <div class="card-grid" id="cardGrid"></div>

  <div class="empty-state" id="emptyState" hidden>
    <div class="icon">&#128218;</div>
    <h2>还没有论文</h2>
    <p>Paper Card 将学术论文提炼为精读长图。第一篇论文正在路上，敬请期待。</p>
  </div>

  <footer class="footer">
    Paper Card · 论文精读项目
  </footer>
</div>

<script>
(async function() {
  const grid = document.getElementById('cardGrid');
  const empty = document.getElementById('emptyState');

  let manifest;
  try {
    const resp = await fetch('papers/manifest.json');
    if (!resp.ok) throw new Error('manifest not found');
    manifest = await resp.json();
  } catch {
    manifest = { papers: [] };
  }

  const papers = manifest.papers || [];

  if (papers.length === 0) {
    grid.remove();
    empty.hidden = false;
    return;
  }

  empty.remove();

  papers.forEach(paper => {
    const card = document.createElement('article');
    card.className = 'card';
    card.addEventListener('click', () => {
      window.location.href = 'papers/' + paper.detail_url;
    });

    // Thumbnail
    if (paper.thumbnail) {
      const img = document.createElement('img');
      img.className = 'card-thumb';
      img.src = 'papers/' + paper.thumbnail;
      img.alt = paper.title;
      img.loading = 'lazy';
      card.appendChild(img);
    } else {
      const placeholder = document.createElement('div');
      placeholder.className = 'card-thumb-placeholder';
      placeholder.textContent = paper.title;
      card.appendChild(placeholder);
    }

    const body = document.createElement('div');
    body.className = 'card-body';

    // Venue
    if (paper.venue) {
      const venue = document.createElement('div');
      venue.className = 'card-venue';
      venue.textContent = paper.venue;
      body.appendChild(venue);
    }

    // Title
    const title = document.createElement('h2');
    title.className = 'card-title';
    title.textContent = paper.title;
    body.appendChild(title);

    // Authors with et al.
    if (paper.authors && paper.authors.length > 0) {
      const authors = document.createElement('div');
      authors.className = 'card-authors';
      const shown = paper.authors.slice(0, 3);
      authors.textContent = shown.join(', ');
      if (paper.authors.length > 3) {
        authors.textContent += ' et al.';
      }
      body.appendChild(authors);
    }

    // Description
    if (paper.description) {
      const desc = document.createElement('p');
      desc.className = 'card-description';
      desc.textContent = paper.description;
      body.appendChild(desc);
    }

    // Year
    if (paper.year) {
      const year = document.createElement('div');
      year.className = 'card-year';
      year.textContent = paper.year;
      body.appendChild(year);
    }

    // Draft badge
    if (paper.detail_url && !paper.detail_url.includes('final')) {
      const badge = document.createElement('span');
      badge.className = 'card-draft-badge';
      badge.textContent = '草稿';
      body.appendChild(badge);
    }

    card.appendChild(body);
    grid.appendChild(card);
  });
})();
</script>
</body>
</html>
